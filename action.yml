name: 'Voice Agent Action'
description: 'Voice agent integration — init (bootstrap) or adapt (PR-based hook integration)'
inputs:
  claude_code_oauth_token:
    description: 'Claude Code OAuth token for subscription-based usage'
    required: true
  voice_agent_branch:
    description: 'Target branch name'
    required: false
    default: 'voice-agent'
  github_token:
    description: 'GitHub token with contents:write, pull-requests:write permissions'
    required: false
    default: ${{ github.token }}
  mode:
    description: 'init (bootstrap new project) or adapt (PR voice hook integration)'
    required: false
    default: 'adapt'
  pr_number:
    description: 'PR number (required for workflow_dispatch adapt mode)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Bot guard (prevent infinite loops)
      if: ${{ inputs.mode == 'adapt' }}
      id: guard
      shell: bash
      run: |
        LAST_AUTHOR=$(git log -1 --format='%an')
        if [[ "$LAST_AUTHOR" == "github-actions[bot]" ]]; then
          echo "Skipping — last commit was from the action"
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout PR branch (workflow_dispatch only)
      if: ${{ inputs.mode == 'adapt' && inputs.pr_number != '' && steps.guard.outputs.skip != 'true' }}
      shell: bash
      run: |
        # For pull_request events, actions/checkout already checked out the branch.
        # Only fetch+checkout for workflow_dispatch where ref wasn't set.
        PR_HEAD=$(git ls-remote origin "pull/${{ inputs.pr_number }}/head" | cut -f1)
        CURRENT=$(git rev-parse HEAD)
        if [[ -n "$PR_HEAD" && "$PR_HEAD" != "$CURRENT" ]]; then
          echo "Checking out PR #${{ inputs.pr_number }}"
          git fetch origin "pull/${{ inputs.pr_number }}/head:pr-${{ inputs.pr_number }}"
          git checkout "pr-${{ inputs.pr_number }}"
        else
          echo "Already on PR branch"
        fi

    - name: Read config
      id: config
      shell: bash
      run: |
        MODE="${{ inputs.mode }}"
        BRANCH="${{ inputs.voice_agent_branch }}"

        if [[ "$MODE" == "adapt" ]]; then
          # In adapt mode, read config from the base branch (voice-agent)
          CONFIG=$(git show "origin/${BRANCH}:.voice-agent.yml" 2>/dev/null || echo "")
          if [[ -z "$CONFIG" ]]; then
            echo "::error::Missing .voice-agent.yml on ${BRANCH} branch"
            exit 1
          fi
          echo "$CONFIG" > /tmp/.voice-agent.yml
          CONFIG_FILE="/tmp/.voice-agent.yml"
        else
          if [ ! -f .voice-agent.yml ]; then
            echo "::error::Missing .voice-agent.yml in repository root"
            exit 1
          fi
          CONFIG_FILE=".voice-agent.yml"
        fi

        # Parse YAML config using node (yq not available on self-hosted runners)
        node -e "
          const fs = require('fs');
          const yaml = fs.readFileSync('$CONFIG_FILE', 'utf8');
          const config = {};
          yaml.split('\n').forEach(line => {
            const m = line.match(/^(\w+):\s*(.+)/);
            if (m) config[m[1]] = m[2].replace(/^[\"']|[\"']$/g, '').trim();
          });
          const keys = ['copilot_name','copilot_color','domain','description','voice_agent_version','site_title','farewell_message','system_prompt_intro','greeting_message','avatar_url','language'];
          const out = [];
          keys.forEach(k => out.push(k + '=' + (config[k] || '')));
          if (!config.voice_agent_version) out.push('voice_agent_version=latest');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, out.join('\n') + '\n');
        "

    - name: Detect mode (initial vs incremental)
      if: ${{ inputs.mode == 'init' }}
      id: mode
      shell: bash
      run: |
        if git rev-parse --verify "origin/${{ inputs.voice_agent_branch }}" &>/dev/null; then
          if git show "origin/${{ inputs.voice_agent_branch }}:src/voice-config.ts" &>/dev/null && \
             git show "origin/${{ inputs.voice_agent_branch }}:server/voice-config.ts" &>/dev/null; then
            echo "mode=incremental" >> "$GITHUB_OUTPUT"
          else
            echo "Branch exists but voice-config.ts missing — treating as initial"
            echo "mode=initial" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "mode=initial" >> "$GITHUB_OUTPUT"
        fi

    - name: Save ignored files
      if: ${{ inputs.mode == 'init' && steps.mode.outputs.mode == 'incremental' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/save-ignored.sh "${{ inputs.voice_agent_branch }}"

    - name: Content hash check (skip Claude Code if unchanged)
      if: ${{ inputs.mode == 'init' }}
      id: content_hash
      shell: bash
      run: |
        # Hash source files that Claude Code reads — if unchanged, skip the expensive step
        CLAUDE_INPUTS="src/data/services.ts src/App.tsx"
        CLAUDE_INPUTS="$CLAUDE_INPUTS $(find src/components -type f \( -name '*Application*' -o -name '*Form*' \) 2>/dev/null || true)"
        EXISTING_INPUTS=""
        for f in $CLAUDE_INPUTS; do [ -f "$f" ] && EXISTING_INPUTS="$EXISTING_INPUTS $f"; done
        if [ -n "$EXISTING_INPUTS" ]; then
          HASH=$(cat $EXISTING_INPUTS | sha256sum | cut -d' ' -f1)
        else
          HASH=$(echo "empty" | sha256sum | cut -d' ' -f1)
        fi

        OLD_HASH=$(git show "origin/${{ inputs.voice_agent_branch }}:.voice-agent/content-hash" 2>/dev/null || echo "none")

        # Save hash as output — written to file after merge step (checkout destroys working tree)
        echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
        if [[ "$HASH" == "$OLD_HASH" && "${{ steps.mode.outputs.mode }}" == "incremental" ]]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "Content unchanged — skipping Claude Code"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Merge main into voice-agent branch
      if: ${{ inputs.mode == 'init' && steps.mode.outputs.mode == 'incremental' }}
      id: merge
      shell: bash
      run: |
        BRANCH="${{ inputs.voice_agent_branch }}"
        # Start from existing voice-agent branch, preserving all dev commits
        git checkout "origin/${BRANCH}" -B "${BRANCH}"

        if git merge origin/main --no-edit -m "chore: merge main (Figma changes) into voice-agent"; then
          echo "Merge successful"
          echo "strategy=merge" >> "$GITHUB_OUTPUT"
        else
          echo "::warning::Merge conflict — resolving by keeping voice-agent for conflicts"
          # Accept voice-agent's version for conflicts (dev code wins over Figma scaffolding)
          git checkout --ours . 2>/dev/null || true
          git add -A
          git commit --no-edit || true
          echo "strategy=merge-theirs" >> "$GITHUB_OUTPUT"
        fi

    - name: Write content hash
      if: ${{ inputs.mode == 'init' }}
      shell: bash
      run: |
        mkdir -p .voice-agent
        echo "${{ steps.content_hash.outputs.hash }}" > .voice-agent/content-hash

    - name: Scaffold from templates
      if: ${{ inputs.mode == 'init' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/scaffold.sh
      env:
        COPILOT_NAME: ${{ steps.config.outputs.copilot_name }}
        COPILOT_COLOR: ${{ steps.config.outputs.copilot_color }}
        VOICE_AGENT_VERSION: ${{ steps.config.outputs.voice_agent_version }}
        DESCRIPTION: ${{ steps.config.outputs.description }}
        SITE_TITLE: ${{ steps.config.outputs.site_title }}
        FAREWELL_MESSAGE: ${{ steps.config.outputs.farewell_message }}
        SYSTEM_PROMPT_INTRO: ${{ steps.config.outputs.system_prompt_intro }}
        GREETING_MESSAGE: ${{ steps.config.outputs.greeting_message }}
        AVATAR_URL: ${{ steps.config.outputs.avatar_url }}
        LANGUAGE: ${{ steps.config.outputs.language }}

    - name: Pre-flight build check
      if: ${{ inputs.mode == 'adapt' && steps.guard.outputs.skip != 'true' }}
      id: preflight
      shell: bash
      run: |
        npm install
        if npm run build 2>/dev/null; then
          echo "status=pass" >> "$GITHUB_OUTPUT"
        else
          echo "::warning::PR build already failing before adaptation"
          echo "status=fail" >> "$GITHUB_OUTPUT"
        fi
        rm -rf build dist

    - name: Detect PR changes
      if: ${{ inputs.mode == 'adapt' && steps.guard.outputs.skip != 'true' }}
      id: changes
      shell: bash
      run: |
        BRANCH="${{ inputs.voice_agent_branch }}"
        CHANGE_TYPES=$(${{ github.action_path }}/scripts/detect-changes.sh "$BRANCH")
        echo "types=${CHANGE_TYPES}" >> "$GITHUB_OUTPUT"
        echo "Detected changes: ${CHANGE_TYPES}"

        # Save changed files and diff to files (avoid GITHUB_OUTPUT size/quoting issues)
        git diff --name-only "origin/${BRANCH}...HEAD" 2>/dev/null > /tmp/pr-changed-files.txt || echo "" > /tmp/pr-changed-files.txt
        git diff "origin/${BRANCH}...HEAD" -- src/ server/ 2>/dev/null > /tmp/pr-diff.patch || echo "" > /tmp/pr-diff.patch

        # Truncate diff if too large for Claude Code context (500KB limit)
        DIFF_SIZE=$(wc -c < /tmp/pr-diff.patch)
        if [[ "$DIFF_SIZE" -gt 500000 ]]; then
          echo "::warning::PR diff is ${DIFF_SIZE} bytes — truncating to 500KB for Claude Code"
          head -c 500000 /tmp/pr-diff.patch > /tmp/pr-diff-truncated.patch
          mv /tmp/pr-diff-truncated.patch /tmp/pr-diff.patch
          echo "" >> /tmp/pr-diff.patch
          echo "... (diff truncated — full diff too large)" >> /tmp/pr-diff.patch
        fi

    - name: Skip cosmetic-only changes
      if: ${{ inputs.mode == 'adapt' && steps.guard.outputs.skip != 'true' && steps.changes.outputs.types == 'cosmetic-only' }}
      shell: bash
      run: |
        PR="${{ inputs.pr_number }}"
        if [[ -n "$PR" ]]; then
          gh pr comment "$PR" --body "No voice adaptation needed — only cosmetic changes detected."
        fi
        echo "Cosmetic only — skipping Claude Code"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Claude Code adaptation (adapt mode)
      if: ${{ inputs.mode == 'adapt' && steps.guard.outputs.skip != 'true' && steps.changes.outputs.types != 'cosmetic-only' }}
      shell: bash
      run: |
        ACTION_PATH="${{ github.action_path }}"
        CONTEXT_FILE="$ACTION_PATH/prompts/context.md"
        PROMPT_FILE="$ACTION_PATH/prompts/pr-adaptation.md"
        {
          cat "$CONTEXT_FILE"
          echo ""
          cat "$PROMPT_FILE"
          echo ""
          echo "## Project config"
          echo "- Copilot name: ${{ steps.config.outputs.copilot_name }}"
          echo "- Copilot color: ${{ steps.config.outputs.copilot_color }}"
          echo "- Change categories: ${{ steps.changes.outputs.types }}"
          echo ""
          echo "## Changed files"
          cat /tmp/pr-changed-files.txt
          echo ""
          echo "## Diff"
          cat /tmp/pr-diff.patch
        } | npx -y @anthropic-ai/claude-code@latest \
          --model claude-opus-4-6 \
          --print \
          --allowedTools "Edit,Read,Write,Bash,Glob,Grep"
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}

    - name: Detect changes (incremental, init mode)
      if: ${{ inputs.mode == 'init' && steps.mode.outputs.mode == 'incremental' && steps.content_hash.outputs.skip != 'true' }}
      id: init_changes
      shell: bash
      run: |
        CHANGE_TYPES=$(${{ github.action_path }}/scripts/detect-changes.sh)
        echo "types=${CHANGE_TYPES}" >> "$GITHUB_OUTPUT"
        echo "Detected changes: ${CHANGE_TYPES}"

    - name: Claude Code integration
      if: ${{ inputs.mode == 'init' && steps.content_hash.outputs.skip != 'true' }}
      shell: bash
      run: |
        PROMPT_FILE="${{ github.action_path }}/prompts/${{ steps.mode.outputs.mode == 'initial' && 'initial-integration' || 'incremental-update' }}.md"
        CONTEXT_FILE="${{ github.action_path }}/prompts/context.md"

        {
          cat "$CONTEXT_FILE"
          echo ""
          cat "$PROMPT_FILE"
          echo ""
          echo "The project config is:"
          echo "- Copilot name: ${{ steps.config.outputs.copilot_name }}"
          echo "- Copilot color: ${{ steps.config.outputs.copilot_color }}"
          echo "- Domain: ${{ steps.config.outputs.domain }}"
          echo "- Description: ${{ steps.config.outputs.description }}"
          ${{ steps.init_changes.outputs.types && format('echo "- Change categories: {0}"', steps.init_changes.outputs.types) || 'true' }}
        } | npx -y @anthropic-ai/claude-code@latest \
          --model claude-opus-4-6 \
          --print \
          --allowedTools "Edit,Read,Write,Bash,Glob,Grep"
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}

    - name: Restore ignored files
      if: ${{ inputs.mode == 'init' && steps.mode.outputs.mode == 'incremental' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/restore-ignored.sh

    - name: Verify build
      shell: bash
      run: ${{ github.action_path }}/scripts/verify.sh

    - name: Clean build artifacts before commit
      shell: bash
      run: rm -rf node_modules build dist server/node_modules

    - name: Commit and push (adapt mode)
      if: ${{ inputs.mode == 'adapt' && steps.guard.outputs.skip != 'true' && steps.changes.outputs.types != 'cosmetic-only' }}
      id: adapt_push
      shell: bash
      run: |
        PR="${{ inputs.pr_number }}"
        git add src/ server/ .voice-agent* 2>/dev/null || true
        if git diff --cached --quiet; then
          echo "No changes — skipping push"
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          if [[ -n "$PR" ]]; then
            gh pr comment "$PR" --body "No voice adaptation needed — PR is already compatible."
          fi
          exit 0
        fi
        git commit -m "chore: adapt voice-agent hooks for PR #${PR}"
        git push
        echo "skipped=false" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: PR comment (success)
      if: ${{ inputs.mode == 'adapt' && steps.adapt_push.outputs.skipped == 'false' }}
      shell: bash
      run: |
        PR="${{ inputs.pr_number }}"
        [[ -n "$PR" ]] && gh pr comment "$PR" --body "Voice hooks adapted. Please review the latest commit."
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: PR comment (build failure)
      if: ${{ inputs.mode == 'adapt' && failure() }}
      shell: bash
      run: |
        PR="${{ inputs.pr_number }}"
        if [[ -n "$PR" ]]; then
          if [[ "${{ steps.preflight.outputs.status }}" == "fail" ]]; then
            gh pr comment "$PR" --body "Build was already failing before voice adaptation. Claude Code did not make it worse."
          else
            gh pr comment "$PR" --body "Voice adaptation broke the build. Manual fix needed. Check the workflow run for details."
          fi
        fi
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Update voice-agent branch
      if: ${{ inputs.mode == 'init' }}
      id: push
      shell: bash
      run: |
        BRANCH="${{ inputs.voice_agent_branch }}"
        MODE="${{ steps.mode.outputs.mode }}"
        MAIN_SHORT=$(git rev-parse --short origin/main)

        if [[ "$MODE" == "initial" ]]; then
          # Initial: create branch from scratch (first-time setup)
          git checkout -B "$BRANCH"
        fi
        # Incremental: already on voice-agent from the merge step

        git add -A

        if git diff --cached --quiet; then
          echo "No changes — skipping push"
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ "$MODE" == "initial" ]]; then
          git commit -m "chore: initialize voice-agent from main ${MAIN_SHORT}"
          git push --force origin "$BRANCH"
        else
          git commit -m "chore: sync voice-agent with main ${MAIN_SHORT}"
          git push origin "$BRANCH"
        fi

        echo "skipped=false" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Summary
      if: ${{ inputs.mode == 'init' && steps.push.outputs.skipped != 'true' }}
      shell: bash
      run: |
        echo "voice-agent branch updated. Coolify will auto-deploy from this branch."
        echo "Branch: ${{ inputs.voice_agent_branch }}"
        echo "Mode: ${{ steps.mode.outputs.mode }}"
