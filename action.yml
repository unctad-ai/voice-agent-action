name: 'Voice Agent Sync'
description: 'Rebuild voice-agent branch from Figma Make main branch with voice agent integration'
inputs:
  claude_code_oauth_token:
    description: 'Claude Code OAuth token for subscription-based usage'
    required: true
  voice_agent_branch:
    description: 'Target branch name'
    required: false
    default: 'voice-agent'
  github_token:
    description: 'GitHub token with contents:write permissions'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Read config
      id: config
      shell: bash
      run: |
        if [ ! -f .voice-agent.yml ]; then
          echo "::error::Missing .voice-agent.yml in repository root"
          exit 1
        fi
        # Parse YAML config using node (yq not available on self-hosted runners)
        node -e "
          const fs = require('fs');
          const yaml = fs.readFileSync('.voice-agent.yml', 'utf8');
          const config = {};
          yaml.split('\n').forEach(line => {
            const m = line.match(/^(\w+):\s*(.+)/);
            if (m) config[m[1]] = m[2].replace(/^[\"']|[\"']$/g, '').trim();
          });
          const keys = ['copilot_name','copilot_color','domain','description','voice_agent_version','auto_merge_incremental','site_title','farewell_message','system_prompt_intro','greeting_message','avatar_url','language'];
          const out = [];
          keys.forEach(k => out.push(k + '=' + (config[k] || '')));
          // Defaults
          if (!config.voice_agent_version) out.push('voice_agent_version=latest');
          if (!config.auto_merge_incremental) out.push('auto_merge_incremental=true');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, out.join('\n') + '\n');
        "

    - name: Detect mode (initial vs incremental)
      id: mode
      shell: bash
      run: |
        if git rev-parse --verify "origin/${{ inputs.voice_agent_branch }}" &>/dev/null; then
          if git show "origin/${{ inputs.voice_agent_branch }}:src/voice-config.ts" &>/dev/null && \
             git show "origin/${{ inputs.voice_agent_branch }}:server/voice-config.ts" &>/dev/null; then
            echo "mode=incremental" >> "$GITHUB_OUTPUT"
          else
            echo "Branch exists but voice-config.ts missing — treating as initial"
            echo "mode=initial" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "mode=initial" >> "$GITHUB_OUTPUT"
        fi

    - name: Backup existing voice-agent branch
      if: steps.mode.outputs.mode == 'incremental'
      shell: bash
      run: |
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        git tag "voice-agent-backup-${TIMESTAMP}" "origin/${{ inputs.voice_agent_branch }}"
        git push origin "voice-agent-backup-${TIMESTAMP}"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Save ignored files
      if: steps.mode.outputs.mode == 'incremental'
      shell: bash
      run: ${{ github.action_path }}/scripts/save-ignored.sh "${{ inputs.voice_agent_branch }}"

    - name: Content hash check (skip Claude Code if unchanged)
      id: content_hash
      shell: bash
      run: |
        # Hash source files that Claude Code reads — if unchanged, skip the expensive step
        CLAUDE_INPUTS="src/data/services.ts src/App.tsx"
        CLAUDE_INPUTS="$CLAUDE_INPUTS $(find src/components -type f \( -name '*Application*' -o -name '*Form*' \) 2>/dev/null || true)"
        EXISTING_INPUTS=""
        for f in $CLAUDE_INPUTS; do [ -f "$f" ] && EXISTING_INPUTS="$EXISTING_INPUTS $f"; done
        if [ -n "$EXISTING_INPUTS" ]; then
          HASH=$(cat $EXISTING_INPUTS | sha256sum | cut -d' ' -f1)
        else
          HASH=$(echo "empty" | sha256sum | cut -d' ' -f1)
        fi

        OLD_HASH=$(git show "origin/${{ inputs.voice_agent_branch }}:.voice-agent/content-hash" 2>/dev/null || echo "none")

        mkdir -p .voice-agent
        echo "$HASH" > .voice-agent/content-hash
        if [[ "$HASH" == "$OLD_HASH" && "${{ steps.mode.outputs.mode }}" == "incremental" ]]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "Content unchanged — skipping Claude Code"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Merge main into voice-agent branch
      if: steps.mode.outputs.mode == 'incremental'
      shell: bash
      run: |
        # Start from the existing voice-agent branch and merge main into it.
        # This preserves all development commits while pulling in Figma changes.
        git checkout "origin/${{ inputs.voice_agent_branch }}" -B "${{ inputs.voice_agent_branch }}"
        git merge main --no-edit -m "chore: merge main (Figma changes) into voice-agent" || {
          echo "::warning::Merge conflict detected — falling back to file-level restore"
          git merge --abort
          # Fallback: stay on main, restore voice-agent files on top
          git checkout main
          BRANCH="origin/${{ inputs.voice_agent_branch }}"
          RESTORED=0
          for f in $(git diff --name-only origin/main "$BRANCH" -- src/ server/ 2>/dev/null || true); do
            if git show "${BRANCH}:${f}" &>/dev/null; then
              mkdir -p "$(dirname "$f")"
              git show "${BRANCH}:${f}" > "$f"
              RESTORED=$((RESTORED + 1))
            fi
          done
          echo "  Fallback restored: $RESTORED files"
        }

    - name: Scaffold from templates
      shell: bash
      run: ${{ github.action_path }}/scripts/scaffold.sh
      env:
        COPILOT_NAME: ${{ steps.config.outputs.copilot_name }}
        COPILOT_COLOR: ${{ steps.config.outputs.copilot_color }}
        VOICE_AGENT_VERSION: ${{ steps.config.outputs.voice_agent_version }}
        DESCRIPTION: ${{ steps.config.outputs.description }}
        SITE_TITLE: ${{ steps.config.outputs.site_title }}
        FAREWELL_MESSAGE: ${{ steps.config.outputs.farewell_message }}
        SYSTEM_PROMPT_INTRO: ${{ steps.config.outputs.system_prompt_intro }}
        GREETING_MESSAGE: ${{ steps.config.outputs.greeting_message }}
        AVATAR_URL: ${{ steps.config.outputs.avatar_url }}
        LANGUAGE: ${{ steps.config.outputs.language }}

    - name: Detect changes (incremental)
      if: steps.mode.outputs.mode == 'incremental' && steps.content_hash.outputs.skip != 'true'
      id: changes
      shell: bash
      run: |
        CHANGE_TYPES=$(${{ github.action_path }}/scripts/detect-changes.sh)
        echo "types=${CHANGE_TYPES}" >> "$GITHUB_OUTPUT"
        echo "Detected changes: ${CHANGE_TYPES}"

    - name: Claude Code integration
      if: steps.content_hash.outputs.skip != 'true'
      shell: bash
      run: |
        PROMPT_FILE="${{ github.action_path }}/prompts/${{ steps.mode.outputs.mode == 'initial' && 'initial-integration' || 'incremental-update' }}.md"

        {
          cat "$PROMPT_FILE"
          echo ""
          echo "The project config is:"
          echo "- Copilot name: ${{ steps.config.outputs.copilot_name }}"
          echo "- Copilot color: ${{ steps.config.outputs.copilot_color }}"
          echo "- Domain: ${{ steps.config.outputs.domain }}"
          echo "- Description: ${{ steps.config.outputs.description }}"
          ${{ steps.changes.outputs.types && format('echo "- Change categories: {0}"', steps.changes.outputs.types) || 'true' }}
        } | npx -y @anthropic-ai/claude-code@latest \
          --model claude-opus-4-6 \
          --print \
          --allowedTools "Edit,Read,Write,Bash,Glob,Grep"
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}

    - name: Restore ignored files
      if: steps.mode.outputs.mode == 'incremental'
      shell: bash
      run: ${{ github.action_path }}/scripts/restore-ignored.sh

    - name: Verify build
      shell: bash
      run: ${{ github.action_path }}/scripts/verify.sh

    - name: Clean build artifacts before commit
      shell: bash
      run: rm -rf node_modules build dist server/node_modules

    - name: Update voice-agent branch
      id: push
      shell: bash
      run: |
        BRANCH="${{ inputs.voice_agent_branch }}"
        MODE="${{ steps.mode.outputs.mode }}"
        MAIN_SHORT=$(git rev-parse --short main)

        if [[ "$MODE" == "incremental" ]]; then
          # Incremental: merge main into existing voice-agent branch.
          # This preserves development commits while pulling in Figma changes.
          git stash --include-untracked
          git checkout "$BRANCH"
          git stash pop || true

          git add -A
          if git diff --cached --quiet; then
            echo "No changes — skipping push"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: sync voice-agent with main ${MAIN_SHORT}"
          git push origin "$BRANCH"
        else
          # Initial: create branch from scratch (first-time setup)
          git checkout -B "$BRANCH"
          git add -A

          NEW_TREE=$(git write-tree)
          OLD_TREE=$(git rev-parse "origin/${BRANCH}^{tree}" 2>/dev/null || echo "none")
          if [[ "$NEW_TREE" == "$OLD_TREE" ]]; then
            echo "Tree unchanged — skipping push"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: initialize voice-agent from main ${MAIN_SHORT}"
          git push --force origin "$BRANCH"
        fi

        echo "skipped=false" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Summary
      if: steps.push.outputs.skipped != 'true'
      shell: bash
      run: |
        echo "voice-agent branch updated. Coolify will auto-deploy from this branch."
        echo "Branch: ${{ inputs.voice_agent_branch }}"
        echo "Mode: ${{ steps.mode.outputs.mode }}"
