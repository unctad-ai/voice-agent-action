name: 'Voice Agent Sync'
description: 'Rebuild voice-agent branch from Figma Make main branch with voice agent integration'
inputs:
  claude_code_oauth_token:
    description: 'Claude Code OAuth token for subscription-based usage'
    required: true
  voice_agent_branch:
    description: 'Target branch name'
    required: false
    default: 'voice-agent'
  github_token:
    description: 'GitHub token with contents:write and pull-requests:write permissions'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Read config
      id: config
      shell: bash
      run: |
        if [ ! -f .voice-agent.yml ]; then
          echo "::error::Missing .voice-agent.yml in repository root"
          exit 1
        fi
        # Parse YAML config using node (yq not available on self-hosted runners)
        node -e "
          const fs = require('fs');
          const yaml = fs.readFileSync('.voice-agent.yml', 'utf8');
          const config = {};
          yaml.split('\n').forEach(line => {
            const m = line.match(/^(\w+):\s*(.+)/);
            if (m) config[m[1]] = m[2].replace(/^[\"']|[\"']$/g, '').trim();
          });
          const keys = ['copilot_name','copilot_color','domain','description','voice_agent_version','auto_merge_incremental'];
          const out = [];
          keys.forEach(k => out.push(k + '=' + (config[k] || '')));
          // Defaults
          if (!config.voice_agent_version) out.push('voice_agent_version=latest');
          if (!config.auto_merge_incremental) out.push('auto_merge_incremental=true');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, out.join('\n') + '\n');
        "

    - name: Detect mode (initial vs incremental)
      id: mode
      shell: bash
      run: |
        if git rev-parse --verify "origin/${{ inputs.voice_agent_branch }}" &>/dev/null; then
          echo "mode=incremental" >> "$GITHUB_OUTPUT"
        else
          echo "mode=initial" >> "$GITHUB_OUTPUT"
        fi

    - name: Backup existing voice-agent branch
      if: steps.mode.outputs.mode == 'incremental'
      shell: bash
      run: |
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        git tag "voice-agent-backup-${TIMESTAMP}" "origin/${{ inputs.voice_agent_branch }}"
        git push origin "voice-agent-backup-${TIMESTAMP}"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Preserve manual additions
      if: steps.mode.outputs.mode == 'incremental'
      id: preserve
      shell: bash
      run: ${{ github.action_path }}/scripts/preserve-manual.sh "${{ inputs.voice_agent_branch }}"

    - name: Scaffold from templates
      shell: bash
      run: ${{ github.action_path }}/scripts/scaffold.sh
      env:
        COPILOT_NAME: ${{ steps.config.outputs.copilot_name }}
        VOICE_AGENT_VERSION: ${{ steps.config.outputs.voice_agent_version }}

    - name: Content hash check (skip Claude Code if unchanged)
      id: content_hash
      shell: bash
      run: |
        # Hash the files Claude Code would read — if unchanged, skip the expensive step
        CLAUDE_INPUTS="src/data/services.ts src/App.tsx"
        CLAUDE_INPUTS="$CLAUDE_INPUTS $(find src/components -type f \( -name '*Application*' -o -name '*Form*' \) 2>/dev/null || true)"
        # Filter to only files that exist (cat fails with pipefail if none exist)
        EXISTING_INPUTS=""
        for f in $CLAUDE_INPUTS; do [ -f "$f" ] && EXISTING_INPUTS="$EXISTING_INPUTS $f"; done
        if [ -n "$EXISTING_INPUTS" ]; then
          HASH=$(cat $EXISTING_INPUTS | sha256sum | cut -d' ' -f1)
        else
          HASH=$(echo "empty" | sha256sum | cut -d' ' -f1)
        fi

        # Read old hash from git tree (not filesystem — preserved files aren't restored yet)
        OLD_HASH=$(git show "origin/${{ inputs.voice_agent_branch }}:.voice-agent/content-hash" 2>/dev/null || echo "none")

        mkdir -p .voice-agent
        echo "$HASH" > .voice-agent/content-hash
        if [[ "$HASH" == "$OLD_HASH" && "${{ steps.mode.outputs.mode }}" == "incremental" ]]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "Content unchanged — skipping Claude Code"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Restore Claude-generated files (when skipping Claude Code)
      if: steps.content_hash.outputs.skip == 'true'
      shell: bash
      run: |
        # When Claude Code is skipped, restore its output files from the existing branch
        CLAUDE_FILES=(
          "src/voice-config.ts"
          "server/voice-config.ts"
          "src/App.tsx"
        )
        # Also restore any form component modifications
        for f in $(git ls-tree -r --name-only "origin/${{ inputs.voice_agent_branch }}" -- src/components/ 2>/dev/null || true); do
          CLAUDE_FILES+=("$f")
        done
        for f in "${CLAUDE_FILES[@]}"; do
          if git show "origin/${{ inputs.voice_agent_branch }}:$f" &>/dev/null; then
            mkdir -p "$(dirname "$f")"
            git show "origin/${{ inputs.voice_agent_branch }}:$f" > "$f"
            echo "  Restored: $f"
          fi
        done

    - name: Detect changes (incremental)
      if: steps.mode.outputs.mode == 'incremental' && steps.content_hash.outputs.skip != 'true'
      id: changes
      shell: bash
      run: |
        CHANGE_TYPES=$(${{ github.action_path }}/scripts/detect-changes.sh)
        echo "types=${CHANGE_TYPES}" >> "$GITHUB_OUTPUT"
        echo "Detected changes: ${CHANGE_TYPES}"

    - name: Claude Code integration
      if: steps.content_hash.outputs.skip != 'true'
      shell: bash
      run: |
        PROMPT_FILE="${{ github.action_path }}/prompts/${{ steps.mode.outputs.mode == 'initial' && 'initial-integration' || 'incremental-update' }}.md"

        {
          cat "$PROMPT_FILE"
          echo ""
          echo "The project config is:"
          echo "- Copilot name: ${{ steps.config.outputs.copilot_name }}"
          echo "- Copilot color: ${{ steps.config.outputs.copilot_color }}"
          echo "- Domain: ${{ steps.config.outputs.domain }}"
          echo "- Description: ${{ steps.config.outputs.description }}"
          ${{ steps.changes.outputs.types && format('echo "- Change categories: {0}"', steps.changes.outputs.types) || 'true' }}
        } | npx -y @anthropic-ai/claude-code@latest \
          --model claude-opus-4-6 \
          --print \
          --allowedTools "Edit,Read,Write,Bash,Glob,Grep"
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}

    - name: Restore preserved files
      if: steps.mode.outputs.mode == 'incremental'
      shell: bash
      run: |
        if [ -d /tmp/voice-agent-preserved ]; then
          cp -r /tmp/voice-agent-preserved/. .
        fi

    - name: Verify build
      shell: bash
      run: ${{ github.action_path }}/scripts/verify.sh

    - name: Clean build artifacts before commit
      shell: bash
      run: rm -rf node_modules build dist server/node_modules

    - name: Update voice-agent branch
      id: push
      shell: bash
      run: |
        git checkout -B "${{ inputs.voice_agent_branch }}"
        git add -A

        # Compare tree hash to skip no-op pushes (e.g. cosmetic-only changes on main)
        NEW_TREE=$(git write-tree)
        OLD_TREE=$(git rev-parse "origin/${{ inputs.voice_agent_branch }}^{tree}" 2>/dev/null || echo "none")
        if [[ "$NEW_TREE" == "$OLD_TREE" ]]; then
          echo "Tree unchanged — skipping push (no voice overlay changes)"
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        git commit -m "chore: rebuild voice-agent from main $(git rev-parse --short main)"
        git push --force origin "${{ inputs.voice_agent_branch }}"
        echo "skipped=false" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Create PR (initial) or notify (incremental)
      if: steps.push.outputs.skipped != 'true'
      shell: bash
      run: |
        MODE="${{ steps.mode.outputs.mode }}"
        AUTO_MERGE="${{ steps.config.outputs.auto_merge_incremental }}"
        if [[ "$MODE" == "initial" ]] || [[ "$AUTO_MERGE" != "true" ]]; then
          # Use GitHub API directly (gh CLI may not be on self-hosted runners)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -d '{
              "title": "Voice Agent Integration",
              "body": "Auto-generated voice agent integration. Please review form field registrations carefully.",
              "head": "${{ inputs.voice_agent_branch }}",
              "base": "main"
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          if [[ "$HTTP_CODE" == "201" ]]; then
            PR_URL=$(echo "$BODY" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).html_url)")
            echo "PR created: $PR_URL"
          elif [[ "$HTTP_CODE" == "422" ]]; then
            echo "PR already exists"
          else
            echo "::warning::PR creation returned HTTP $HTTP_CODE"
            echo "$BODY" | head -5
          fi
        fi
      env:
        GH_TOKEN: ${{ inputs.github_token }}
